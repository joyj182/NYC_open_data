<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">

    <title>NYC Open Data</title>

    <link href="style.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/c3/0.7.20/c3.min.css">

    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/c3/0.7.20/c3.min.js"></script>
</head>

<body>
    <div id="banner3" class="container center">
        <div style="text-align:center">
            <h1>NYC Open Data</h1>
            <h2>Filtering Police Arrests</h2>
        </div>
    </div>
    
<nav class="container">
        <a href="index.html"> Home Page </a>
        <a href="info.html"> Information </a>
        <a href="analysis.html"> Graph </a>
    </nav>
    <div class="container" id="facts2">

        <div>

            <h2>Chart Type</h2>

            <select id="chartType">
                <option value="bar">Bar Chart</option>
                <option value="pie">Pie Chart</option>
                <option value="donut">Donut Chart</option>
            </select>

            <button onclick="makeChart()">Apply</button>

            <div id="chart"></div>

        </div>

        <div>

            <h2>Analysis</h2>

            <p>
                This chart shows police arrests by age group.
            </p>

        </div>

    </div>

    <div id="footer" class="container center">
        <h3>NYC Open Data: Police Arrests</h3>
    </div>

    <script>

        var chart;

        function makeChart() {

            var type =
                document.getElementById("chartType").value;

            if (chart) {
                chart.destroy();
            }

            chart = c3.generate({
                bindto: "#chart",

                data: {
                    columns: [
                        ["Under 18", 350],
                        ["18-24", 580],
                        ["25-44", 320],
                        ["45-64", 180]
                    ],

                    type: type
                },

                donut: {
                }
            });
        }

        makeChart();

    </script>

</body>

</html>
